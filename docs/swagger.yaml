definitions:
  model.Log:
    properties:
      id:
        description: UUID
        type: string
      level:
        description: ログレベル (DEBUG, INFO, WARN, ERROR)
        type: string
      message:
        description: ログメッセージ
        type: string
      metadata:
        additionalProperties:
          type: string
        description: 追加情報（IP, リクエスト ID など）
        type: object
      service:
        description: 送信元サービス
        type: string
      timestamp:
        description: ログ発生時刻
        type: string
      traceID:
        description: 分散トレーシング用の一意なID
        type: string
    type: object
  rest.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  rest.SendLogRequest:
    properties:
      id:
        type: string
      level:
        enum:
        - debug
        - info
        - warn
        - error
        type: string
      message:
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      service:
        type: string
      timestamp:
        type: string
      traceId:
        type: string
    required:
    - level
    - message
    - service
    type: object
  rest.SuccessResponse:
    properties:
      status:
        type: string
    type: object
info:
  contact: {}
paths:
  /logs:
    get:
      consumes:
      - application/json
      description: Retrieves logs that match the provided query parameters (service,
        level, limit, offset).
      parameters:
      - description: Service name (e.g., frontend)
        example: frontend
        in: query
        name: service
        type: string
      - description: Log level
        enum:
        - info
        - warn
        - error
        example: info
        in: query
        name: level
        type: string
      - description: 'Number of logs to return (default: 100)'
        example: 100
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
      - description: 'Offset for pagination (default: 0)'
        example: 0
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Log'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Retrieve logs
      tags:
      - logs
    post:
      consumes:
      - application/json
      description: Registers a new log entry with ID, trace_id, message, level, service,
        timestamp, and metadata.
      parameters:
      - description: Log payload
        in: body
        name: log
        required: true
        schema:
          $ref: '#/definitions/rest.SendLogRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Register a new log entry
      tags:
      - logs
swagger: "2.0"
